# Delphi: one host for Streamlit (/) + FastAPI (/api, /media) + built radar (/radar/).
# ^~ on /radar/ ensures static files win over location / (Streamlit proxy).
#
# Static files: /var/www/delphi/radar/ (rsync from web/dist after npm run build:deploy)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8000/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /radar {
        return 301 $scheme://$host/radar/;
    }

    location ^~ /radar/ {
        root /var/www/delphi;
        index index.html;
        try_files $uri $uri/ @delphi_radar_spa;
    }

    location @delphi_radar_spa {
        root /var/www/delphi;
        rewrite ^ /radar/index.html break;
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
