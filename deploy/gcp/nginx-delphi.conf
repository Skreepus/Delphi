# Delphi: one host for Streamlit (/) + FastAPI (/api, /media) + built radar (/radar/).
# Install: sudo cp deploy/gcp/nginx-delphi.conf /etc/nginx/sites-available/delphi
#          sudo ln -sf /etc/nginx/sites-available/delphi /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Static files are synced to /var/www/delphi/radar/ by deploy/gcp/install.sh

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8000/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /radar {
        return 301 $scheme://$host/radar/;
    }

    location /radar/ {
        root /var/www/delphi;
        try_files $uri $uri/ /radar/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
